<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Bebas Neue', sans-serif;
  }

  .container {
    position: relative;
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('/assets/fotos/hero.webp');
    background-size: cover;
    background-position: center;
    opacity: 0.35;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: #BE008D;
    z-index: 1;
  }

  /* mezcla overlay + imagen */
  .bg { z-index: 2; }
  .overlay { z-index: 1; }

  .content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px;
  }

  .logo {
    width: 1000px;
    height: auto;
  }

  .edicion {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    letter-spacing: 0.25em;
    font-size: 22px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    margin-top: -80px;
  }

  .edicion span {
    color: #fff500;
    font-weight: 500;
  }

  .dot {
    display: inline-block;
    margin: 0 10px;
    opacity: 0.4;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;500&display=swap" rel="stylesheet">
